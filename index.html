<title>Birla Museum</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a1a;color:#f0ede6;font-family:sans-serif;min-height:100vh;}
.wrap{padding:1.25rem;max-width:500px;margin:0 auto;}
.header{background:linear-gradient(135deg,#1a0a2e,#0e0e14);padding:1rem 1.25rem;border-radius:12px;margin-bottom:1rem;border:.5px solid rgba(201,168,76,.3);}
.museum{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#c9a84c;margin-bottom:.4rem;}
.badge{display:inline-block;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#7eb8c9;background:rgba(126,184,201,.12);border:.5px solid rgba(126,184,201,.3);border-radius:20px;padding:3px 11px;margin-bottom:.5rem;}
.title{font-size:1.5rem;font-weight:700;color:#fff;line-height:1.2;margin-bottom:.3rem;}
.era{font-size:11px;color:rgba(240,237,230,.4);}
.section{margin-bottom:1rem;}
.section-title{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#c9a84c;margin-bottom:.5rem;display:flex;align-items:center;gap:6px;}
.section-title::before{content:'';width:3px;height:14px;background:#c9a84c;border-radius:2px;}
ul{list-style:none;}
ul li{font-size:13.5px;line-height:1.7;color:rgba(240,237,230,.88);margin-bottom:.4rem;padding:.4rem .65rem;background:#1a1a28;border-radius:7px;border-left:2.5px solid #c9a84c;display:flex;gap:8px;}
.dot{color:#c9a84c;flex-shrink:0;margin-top:2px;}
.facts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:.8rem;}
.fact{background:#1a1a28;border:.5px solid rgba(201,168,76,.2);border-radius:10px;padding:.65rem .9rem;}
.fl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(240,237,230,.4);margin-bottom:3px;}
.fv{font-size:13px;font-weight:600;color:#e8c97a;}
.footer{margin-top:1rem;padding:.75rem 1rem;background:#1a1a28;border-radius:9px;font-size:11px;color:rgba(240,237,230,.3);text-align:center;}
.nf{text-align:center;padding:3rem 1rem;}
.nf h2{font-size:1.3rem;color:#c9a84c;margin-bottom:.5rem;}
.nf p{color:rgba(240,237,230,.4);font-size:13px;}
</style>

<script>
var X=[{"id":"energy-conversion-gallery-beam-engine","gallery":"Energy Conversion Gallery","title":"Beam Engine","year":"1760s","points":["A beam engine is an early type of steam engine where steam pressure pushes a piston that moves a huge pivoted overhead beam up and down.","Steam enters the cylinder, pushes the piston, and the beam rocks like a giant see-saw — turning heat energy into mechanical work.","James Watt's improvements to the beam engine in the 1760s helped kick-start the Industrial Revolution!"]},{"id":"energy-conversion-gallery-sources-of-power","gallery":"Energy Conversion Gallery","title":"Sources of Power","year":"","points":["This display compares the different ways humans generate power — solar, wind, fossil fuels, hydro, and geothermal energy.","Each source converts energy from nature into electricity or mechanical work using different technologies like turbines, solar cells, or combustion.","Solar and wind energy are renewable — they won't run out, unlike coal or oil which took millions of years to form."]},{"id":"energy-conversion-gallery-basic-mechanisms","gallery":"Energy Conversion Gallery","title":"Basic Mechanisms","year":"","points":["Simple machines — levers, pulleys, screws, inclined planes, wheels, and wedges — are the building blocks of all complex machines.","Each device reduces the force needed to do work by increasing the distance over which it acts, following the conservation of energy.","A door handle is a wheel-and-axle; scissors are two levers; a ramp is an inclined plane — simple machines are everywhere!"]},{"id":"energy-conversion-gallery-early-steam-working","gallery":"Energy Conversion Gallery","title":"Early Steam Working","year":"1606","points":["Before modern engines, steam was explored as a power source as early as 1606 by Giovanni Della Porta.","Denis Papin (1679) built the first pressure cooker, while Hero of Alexandria designed an early steam-spinning device almost 2,000 years ago.","The pressure cooker in your kitchen uses the same basic principle Papin discovered over 300 years ago!"]},{"id":"energy-conversion-gallery-energy-crisis-a-challenge","gallery":"Energy Conversion Gallery","title":"Energy Crisis — A Challenge","year":"","points":["This exhibit highlights the rapid depletion of Earth's fossil fuel reserves.","Oil reserves may last only 42 more years, natural gas 61 years, and coal about 133 years at current usage rates.","Fossil fuels supplied 85% of the world's energy in 2010 — but they take millions of years to form.","We need to act fast!"]},{"id":"energy-conversion-gallery-new-renewable-sources-of-energy","gallery":"Energy Conversion Gallery","title":"New & Renewable Sources of Energy","year":"","points":["This display presents solutions to the energy crisis — solar, wind, hydro, and geothermal energy as clean alternatives.","Renewable sources harness freely available natural forces to generate electricity without harmful emissions.","India has over 300 sunny days per year, making it one of the best countries in the world for solar energy!"]},{"id":"energy-conversion-gallery-steam-plant","gallery":"Energy Conversion Gallery","title":"Steam Plant","year":"","points":["A steam plant generates electricity by heating water into high-pressure steam that spins a turbine connected to a generator.","It operates on the Rankine cycle — water is boiled, steam expands through a turbine, then is condensed and reused.","Steam power plants still generate more than 80% of the world's electricity!"]},{"id":"energy-conversion-gallery-geo-thermal-power","gallery":"Energy Conversion Gallery","title":"Geo Thermal Power","year":"1904","points":["Geothermal energy harnesses heat from deep within the Earth — from magma, hot water reservoirs, or shallow steam reserves.","Wells are drilled into Earth's crust to bring up hot steam, which drives turbines to generate electricity.","The world's first geothermal power plant opened in Tuscany, Italy in 1904!"]},{"id":"energy-conversion-gallery-wind-mill","gallery":"Energy Conversion Gallery","title":"Wind Mill","year":"","points":["A windmill converts the kinetic energy of blowing wind into mechanical energy using rotating blades.","Wind pushes the blades in a circular motion; this rotational energy is transferred through a shaft to do useful work.","One large modern turbine can power over 1,500 average Indian homes!"]},{"id":"energy-conversion-gallery-mhd-power-generation-plant","gallery":"Energy Conversion Gallery","title":"MHD Power Generation Plant","year":"","points":["Magneto-Hydro-Dynamic (MHD) power generation uses the interaction between a magnetic field and electrically conducting plasma to directly produce electricity — no moving mechanical parts needed!","MHD generators are far more efficient than traditional ones and could be the power plants of the future."]},{"id":"energy-conversion-gallery-modern-gas-turbine","gallery":"Energy Conversion Gallery","title":"Modern Gas Turbine","year":"","points":["A gas turbine compresses air, mixes it with fuel, ignites the mixture, and lets the hot expanding gases spin a turbine.","It operates on the Brayton cycle and is used in power plants, jet aircraft engines, and marine ships.","Jet aircraft engines are essentially gas turbines — the same technology gets you to your destination at 900 km/h!"]},{"id":"energy-conversion-gallery-early-water-wheel","gallery":"Energy Conversion Gallery","title":"Early Water Wheel","year":"","points":["A water wheel is one of humanity's oldest machines — it captures the energy of flowing water to turn a wheel and do mechanical work.","The Romans used water wheels for grinding grain and mining.","Ancient Romans built water-wheel mills that could grind enough flour to feed 80,000 people per day!"]},{"id":"energy-conversion-gallery-hydro-turbine-francis","gallery":"Energy Conversion Gallery","title":"Hydro Turbine — Francis","year":"","points":["The Francis turbine is a reaction turbine used in hydroelectric power plants, designed for medium-to-high water heads.","Water flows through a spiral casing, passes through guide vanes, and strikes curved runner blades — the spinning runner drives a generator.","The Francis turbine is the most widely used turbine in the world!"]},{"id":"energy-conversion-gallery-hydro-turbine-pelton-wheel","gallery":"Energy Conversion Gallery","title":"Hydro Turbine — Pelton Wheel","year":"","points":["A Pelton wheel is an impulse turbine where high-speed jets of water strike cup-shaped buckets around a wheel, making it spin rapidly.","The water's kinetic energy is converted to mechanical energy — best used at very high altitudes with fast-falling water.","Pelton wheels are used in Himalayan power stations where water falls from over 1,000 metres!"]},{"id":"energy-conversion-gallery-hydro-turbine-kaplan","gallery":"Energy Conversion Gallery","title":"Hydro Turbine — Kaplan","year":"","points":["The Kaplan turbine works like an adjustable ship propeller running in reverse — water flows through it and makes it spin.","Its adjustable blades change angle to suit varying water flow, making it ideal for low-head installations like large river dams.","Kaplan turbines can operate in rivers with as little as 2 metres of water head!"]},{"id":"energy-conversion-gallery-before-and-after-dam","gallery":"Energy Conversion Gallery","title":"Before and After Dam","year":"","points":["This exhibit shows how building a dam transforms a river valley — creating a large reservoir upstream while controlling water flow downstream.","A dam acts as a barrier, storing water for irrigation, drinking, and power generation while also preventing floods.","India's dams irrigate millions of acres of farmland, feeding a large part of the country's 1.4 billion people!"]},{"id":"energy-conversion-gallery-india-dam","gallery":"Energy Conversion Gallery","title":"India Dam","year":"","points":["India has hundreds of major dams that play a critical role in water supply, electricity, flood control, and irrigation.","Dams store the potential energy of water at height and release it through turbines to generate clean hydroelectric power.","The Tehri Dam in Uttarakhand is one of the tallest dams in the world — taller than 25 ten-storey buildings stacked up!"]},{"id":"energy-conversion-gallery-solar-thermal-power","gallery":"Energy Conversion Gallery","title":"Solar Thermal Power","year":"","points":["Solar thermal plants use large arrays of mirrors to concentrate sunlight, heating a fluid that produces steam to run turbines.","Unlike solar panels, solar thermal uses heat — concentrated sunlight can reach temperatures over 500°C!","The Rajasthan desert gets so much sunlight that solar thermal plants there can generate power for millions of homes."]},{"id":"energy-conversion-gallery-rajasthan-atomic-power-plant","gallery":"Energy Conversion Gallery","title":"Rajasthan Atomic Power Plant","year":"","points":["The Rajasthan Atomic Power Plant at Rawatbhata uses nuclear fission — splitting uranium atoms — to generate heat and electricity.","Controlled splitting of uranium atoms creates a chain reaction that heats water into steam, which spins turbines.","One kg of uranium fuel releases as much energy as burning about 3,000 tonnes of coal!"]},{"id":"energy-conversion-gallery-fast-breeder-nuclear-power-reactor","gallery":"Energy Conversion Gallery","title":"Fast Breeder Nuclear Power Reactor","year":"","points":["A fast breeder reactor not only generates power but also creates more nuclear fuel (plutonium) than it uses!","Fast neutrons convert non-fissile uranium-238 into fissile plutonium-239, which can fuel more reactors.","India's PFBR at Kalpakkam, Tamil Nadu is one of only a handful of fast breeder reactors in the world!"]},{"id":"energy-conversion-gallery-power-from-sea","gallery":"Energy Conversion Gallery","title":"Power from Sea","year":"","points":["The ocean holds enormous energy in its tides, waves, and temperature differences — all of which can be harnessed to generate electricity.","Tidal power uses the rise and fall of sea levels; wave energy captures up-and-down motion; OTEC uses temperature differences.","The total wave energy reaching Earth's coastlines each year exceeds the world's entire electricity consumption!"]},{"id":"energy-conversion-gallery-power-transmission","gallery":"Energy Conversion Gallery","title":"Power Transmission","year":"","points":["Once electricity is generated, it travels long distances through transmission lines at very high voltages (up to 765,000 volts) to reach our homes.","High voltage reduces current, which reduces energy lost as heat — transformers step voltage up for transmission and down for use.","India's power transmission network spans over 4,00,000 km — enough to go around Earth ten times!"]},{"id":"energy-conversion-gallery-modern-hydro-converter","gallery":"Energy Conversion Gallery","title":"Modern Hydro Converter","year":"1831","points":["A hydroelectric generator converts the potential energy of stored water into electrical energy through electromagnetic induction.","Falling water spins a turbine, which rotates an electromagnet inside coils of wire — this induces an electric current, giving us electricity.","Michael Faraday discovered electromagnetic induction in 1831 — the principle behind every electric generator on Earth today!"]},{"id":"energy-conversion-gallery-power-distribution-station","gallery":"Energy Conversion Gallery","title":"Power Distribution Station","year":"","points":["A power distribution station receives high-voltage electricity from transmission lines and steps it down to safe voltages for homes and businesses.","Transformers reduce voltage in stages: from 765 kV to 220 kV to 33 kV to 11 kV to 230 V for household use.","Without distribution stations, the electricity from a power plant would be too dangerous to use in your home!"]},{"id":"metallurgy-gallery-iron-pillar-replica","gallery":"Metallurgy Gallery","title":"Iron Pillar Replica","year":"375 AD","points":["The Iron Pillar of Delhi, erected by Chandragupta II (~375 AD), is 7 metres tall and has resisted rust for over 1,600 years!","IIT Kanpur scientists discovered a thin protective layer of 'misawite' that forms a natural anti-rust shield.","Ancient Indian metallurgists achieved a level of iron-working that modern scientists are still studying!"]},{"id":"metallurgy-gallery-early-smithy-techniques","gallery":"Metallurgy Gallery","title":"Early Smithy Techniques","year":"","points":["A smithy is where iron is shaped into useful objects using a forge, anvil, and hammer.","Iron is heated until red-hot and malleable, then beaten into shape on an anvil — one of humanity's oldest metalworking crafts.","The word 'blacksmith' comes from 'black metal' (iron) plus 'smite' (to hit)!"]},{"id":"metallurgy-gallery-blast-furnace-flow-sheet","gallery":"Metallurgy Gallery","title":"Blast Furnace — Flow Sheet","year":"14th Century","points":["A blast furnace is a towering structure where iron ore, coke, and limestone are heated with hot air blasts to extract pure molten iron.","Iron ore is reduced by carbon monoxide, releasing liquid iron that sinks to the bottom, while slag floats on top.","The first blast furnaces appeared in the 14th century producing 1 tonne per day — modern ones produce over 10,000 tonnes!"]},{"id":"metallurgy-gallery-blast-furnace-panorama","gallery":"Metallurgy Gallery","title":"Blast Furnace — Panorama","year":"","points":["This panoramic model shows the complete blast furnace complex — from ore storage and skip cars to the tapping floor where molten iron flows out.","Hot blast air (up to 1,200°C) is blasted in through nozzles called tuyeres; the entire furnace runs continuously for months without shutting down.","A large modern blast furnace taps molten iron every 45 minutes — enough metal to fill a swimming pool each day!"]},{"id":"metallurgy-gallery-bessemer-converter","gallery":"Metallurgy Gallery","title":"Bessemer Converter","year":"1856","points":["The Bessemer converter (1856) was a revolutionary steel-making device — a huge egg-shaped vessel that blew air through molten iron to burn away impurities.","Before Bessemer, making steel took days; the converter did it in under 30 minutes — revolutionising construction and railways worldwide!"]},{"id":"metallurgy-gallery-arc-furnace","gallery":"Metallurgy Gallery","title":"Arc Furnace","year":"","points":["An Electric Arc Furnace (EAF) uses powerful electric arcs between graphite electrodes and steel scrap to generate temperatures over 3,000°C.","Steel scrap is loaded in, electrodes are lowered, and an electric arc melts everything into liquid steel.","The electricity for one EAF melt (150 tonnes) is enough to power a town of 100,000 people!"]},{"id":"metallurgy-gallery-oxygen-blown-converter","gallery":"Metallurgy Gallery","title":"Oxygen Blown Converter","year":"","points":["The Basic Oxygen Furnace converts molten iron from a blast furnace into steel by blowing pure oxygen into the liquid metal.","Pure oxygen reacts with excess carbon far more efficiently than air — making a tonne of steel in just 20 minutes.","Over 70% of the world's steel today is made in oxygen blown converters!"]},{"id":"metallurgy-gallery-induction-furnace","gallery":"Metallurgy Gallery","title":"Induction Furnace","year":"","points":["An induction furnace uses electromagnetic induction to generate heat inside the metal itself — no external flame needed.","Alternating current in coils creates rapidly changing magnetic fields that induce electric currents inside metal, heating it from within.","Induction furnaces are so precise they are used to make surgical tools, aerospace alloys, and jewellery!"]},{"id":"metallurgy-gallery-boiler-factory","gallery":"Metallurgy Gallery","title":"Boiler Factory","year":"","points":["A boiler is a pressure vessel that heats water into steam for industrial use; the boiler factory exhibit shows how these critical components are manufactured.","Boilers are made from special steels that can withstand high temperatures and pressures — cut, shaped, and welded with great precision.","Industrial boilers must undergo rigorous safety tests before use — even a small crack could cause a catastrophic explosion!"]},{"id":"metallurgy-gallery-machine-shop","gallery":"Metallurgy Gallery","title":"Machine Shop","year":"","points":["A machine shop is where raw metal pieces are cut, drilled, turned, and milled into precise parts using lathes, mills, and drills.","The three main processes are turning (rotating the workpiece), milling (rotating the cutting tool), and drilling (making holes).","The modern machine shop traces back to 18th-century New England gunmakers — who developed the concept of interchangeable parts!"]},{"id":"metallurgy-gallery-rolling-mill","gallery":"Metallurgy Gallery","title":"Rolling Mill","year":"","points":["A rolling mill passes hot or cold metal between heavy rollers to flatten it into sheets, rods, rails, or beams of uniform thickness.","Hot rolling works above the metal's recrystallisation temperature; cold rolling gives a smooth surface finish.","Every railway track, steel beam, and tin can started life as a thick slab that passed through a rolling mill!"]},{"id":"metallurgy-gallery-wire-rod-drawing-mill","gallery":"Metallurgy Gallery","title":"Wire Rod Drawing Mill","year":"","points":["Wire drawing pulls metal through progressively smaller die holes to produce thin wires of exact diameter — for cables, springs, and musical strings.","The wire is squeezed through a hard die; as diameter decreases, length increases — volume remains constant.","The steel cables holding up a suspension bridge consist of thousands of individual wires, each produced by this exact wire drawing process!"]},{"id":"metallurgy-gallery-forging-shop","gallery":"Metallurgy Gallery","title":"Forging Shop","year":"","points":["Forging shapes metal by applying compressive forces — hammering, pressing, or rolling — often while the metal is hot and malleable.","Different forging types include drop forging, press forging, and open-die forging.","Forged parts are stronger than cast ones because the process aligns the metal's grain structure!"]},{"id":"metallurgy-gallery-cast-iron-foundry","gallery":"Metallurgy Gallery","title":"Cast Iron Foundry","year":"","points":["In a foundry, molten iron is poured into shaped moulds and allowed to solidify — creating complex 3D metal objects.","Patterns create hollow cavities in sand moulds; liquid metal fills these cavities and takes their shape.","Engine blocks, manhole covers, cooking pots, and ornamental gates are all made by casting!"]},{"id":"metallurgy-gallery-steel-foundry","gallery":"Metallurgy Gallery","title":"Steel Foundry","year":"","points":["A steel foundry melts scrap steel and alloys, pours it into precise moulds, and produces engineered steel components of exact shape.","The process involves melting, refining the chemistry, pouring, cooling, removing the mould, and finishing the part.","Steel castings in a ship's propeller must be perfect — even a tiny crack can cause catastrophic failure at sea!"]},{"id":"metallurgy-gallery-alumina-plant","gallery":"Metallurgy Gallery","title":"Alumina Plant","year":"","points":["An alumina plant extracts aluminium oxide (alumina) from bauxite ore using the Bayer Process — a key step before producing aluminium metal.","Crushed bauxite is dissolved in hot sodium hydroxide; the aluminium oxide precipitates out, is filtered, and calcined into pure white alumina powder.","Aluminium is the most abundant metal in Earth's crust, yet it was once more valuable than gold!"]},{"id":"metallurgy-gallery-aluminium-pot-room","gallery":"Metallurgy Gallery","title":"Aluminium Pot Room","year":"","points":["The pot room is where alumina is converted to aluminium metal using electrolysis — the Hall-Héroult process.","Massive electric currents (up to 500,000 amperes) pass through molten alumina dissolved in cryolite, separating pure aluminium at the bottom.","Making 1 kg of aluminium requires about 13 kWh of electricity — which is why recycling saves 95% of that energy!"]},{"id":"transportation-gallery-wheel-through-centuries","gallery":"Transportation Gallery","title":"Wheel Through Centuries","year":"3500 BC","points":["The wheel — invented around 3500 BC in Mesopotamia — is arguably humanity's greatest invention, evolving from solid wooden discs to modern pneumatic tyres.","Spoked wheels (2000 BC Egypt) reduced weight; iron rims improved durability; pneumatic tyres (1888) absorbed road shocks.","The latest 'Tweel' is an airless tyre that never goes flat!"]},{"id":"transportation-gallery-steam-carriage","gallery":"Transportation Gallery","title":"Steam Carriage","year":"1801","points":["A steam carriage was an early self-propelled road vehicle powered by a steam engine — the ancestor of all automobiles.","Water was heated in a boiler; steam pressure pushed pistons connected to drive wheels — no horses needed!","Richard Trevithick built the first steam carriage in 1801 in Cornwall — nicknamed 'Puffing Devil'!"]},{"id":"transportation-gallery-aircraft-factory","gallery":"Transportation Gallery","title":"Aircraft Factory","year":"","points":["This exhibit shows how aircraft are manufactured — from aluminium alloy frame construction to wing assembly, engine installation, and final testing.","Aircraft frames use lightweight aluminium alloys and composites; riveting, welding, and precision machining are used to assemble thousands of parts.","A modern passenger aircraft has over 6 million individual parts — each one must be perfect for a safe flight!"]},{"id":"transportation-gallery-early-modern-aircraft-models","gallery":"Transportation Gallery","title":"Early & Modern Aircraft Models","year":"1903","points":["From the Wright Brothers' 1903 Flyer (12 seconds in the air) to supersonic jets, aircraft design has been transformed by aerodynamics.","Aircraft generate lift because their wing shape makes air flow faster over the top, reducing pressure and creating an upward force (Bernoulli's principle).","The Wright Flyer's entire flight path is shorter than the wingspan of a modern Boeing 747!"]},{"id":"transportation-gallery-comet","gallery":"Transportation Gallery","title":"Comet","year":"1952","points":["The de Havilland Comet (1952) was the world's first commercial jet airliner — flying at 800 km/h at altitudes propeller planes couldn't reach.","Jet engines compress air, mix it with fuel, and ignite it — thrust from exhausting hot gases propels the aircraft.","Early Comets suffered crashes caused by metal fatigue at square windows — leading to the oval windows we see today!"]},{"id":"transportation-gallery-bridges-and-highways","gallery":"Transportation Gallery","title":"Bridges and Highways","year":"","points":["Bridges allow roads to cross rivers and valleys — using principles of compression, tension, and bending to carry enormous loads.","Different bridge types include beam, arch, suspension, and cable-stayed — each using different structural principles.","India's Bandra-Worli Sea Link has enough steel wire to circle the Earth's equator one and a half times!"]},{"id":"transportation-gallery-carriage-of-the-past","gallery":"Transportation Gallery","title":"Carriage of the Past","year":"1670s","points":["Before engines, horse-drawn carriages were the primary mode of land transport — ranging from simple carts to ornate royal coaches.","Early carriages used leaf springs for suspension (1670s), elliptical springs (1804), and later rubber tyres for a smoother ride.","The word 'coach' comes from the Hungarian town of Kocs, which became famous in the 15th century for building the best carriages!"]},{"id":"transportation-gallery-flights-in-mythology","gallery":"Transportation Gallery","title":"Flights in Mythology","year":"","points":["Humans have dreamed of flight since ancient times — from the Greek myth of Icarus to the Vedic flying chariots (Vimanas) and Hanuman's aerial journeys.","These stories reflect humanity's deep desire to overcome gravity — a desire that finally became reality with the Wright Brothers in 1903.","The Ramayana describes Pushpak Vimana — a flying palace — centuries before aircraft existed!"]},{"id":"transportation-gallery-development-of-transportation","gallery":"Transportation Gallery","title":"Development of Transportation","year":"","points":["This timeline shows how transport evolved — from foot and animal power, to sail, wheel, steam, internal combustion, and finally electric and space travel.","Each breakthrough reduced travel time and made the world more connected.","A journey from Mumbai to Delhi that took 3 months by bullock cart in 1800 takes under 2 hours by aeroplane today!"]},{"id":"transportation-gallery-motor-car-factory","gallery":"Transportation Gallery","title":"Motor Car Factory","year":"1913","points":["This exhibit shows how automobiles are mass-produced — from stamping body panels and building the engine to final assembly and quality inspection.","Henry Ford's assembly line (1913) revolutionised car manufacturing — workers stayed in one place while the car moved to them.","India is now the 3rd largest automobile market in the world — producing over 4 million cars every year!"]},{"id":"transportation-gallery-various-road-vehicles","gallery":"Transportation Gallery","title":"Various Road Vehicles","year":"","points":["Road vehicles range from bicycles and motorcycles to buses, trucks, and specialised vehicles like fire engines and ambulances — each designed for specific tasks.","All road vehicles share basic components: engine/motor, transmission, steering, braking, and suspension — but differ in size, power, and purpose.","There are over 1.4 billion vehicles on Earth's roads — if lined up bumper-to-bumper, they would circle the globe over 50 times!"]},{"id":"transportation-gallery-sea-port","gallery":"Transportation Gallery","title":"Sea Port","year":"","points":["A sea port is a hub of global trade — equipped with cranes, container terminals, and navigational aids to load and unload massive cargo ships.","Modern container ports use giant gantry cranes to load standardised containers onto ships — enabling 90% of the world's goods to travel by sea.","The Port of Shanghai handles over 47 million containers every year!"]},{"id":"transportation-gallery-ship-yard","gallery":"Transportation Gallery","title":"Ship Yard","year":"","points":["A shipyard is where ships are built, repaired, and maintained — using massive dry docks, cranes, welding equipment, and specialised workers.","Ship hulls are built from steel plates welded together; propulsion systems, engines, and superstructures are added in stages.","The largest ships ever built — supertankers — are over 450 metres long and weigh half a million tonnes when loaded!"]},{"id":"transportation-gallery-light-house","gallery":"Transportation Gallery","title":"Light House","year":"280 BC","points":["A lighthouse is a tower with a powerful rotating light at the top that warns sailors of dangerous coastlines, rocks, and harbour entrances.","Early lighthouses used oil lamps with parabolic mirrors to amplify light; modern ones use electric lamps with Fresnel lenses visible for 30+ km.","The Lighthouse of Alexandria (280 BC) was one of the Seven Wonders of the Ancient World — over 100 metres tall!"]},{"id":"transportation-gallery-ship-through-centuries","gallery":"Transportation Gallery","title":"Ship Through Centuries","year":"10,000 BC","points":["Ships have evolved from simple dugout canoes (10,000 BC) through wooden sailing galleons to steel-hulled container ships.","Key innovations include the sail, rudder, iron/steel hulls, steam engines, and diesel propulsion.","Ancient Phoenician sailors were navigating the Mediterranean Sea 3,000 years ago — using only the stars as their GPS!"]},{"id":"transportation-gallery-early-steam-locomotive","gallery":"Transportation Gallery","title":"Early Steam Locomotive","year":"1825","points":["George Stephenson built 'Locomotion No.1' in 1825 — the world's first steam locomotive to carry passengers on a public railway.","Steam pressure from a boiler moved pistons connected to driving wheels; early locomotives burned coal and reached 15-20 km/h.","Stephenson chose a track gauge of 4 feet 8.5 inches — still the world's standard railway gauge used today!"]},{"id":"transportation-gallery-steam-locomotive","gallery":"Transportation Gallery","title":"Steam Locomotive","year":"19th Century","points":["Steam locomotives were the backbone of 19th and early 20th century transport — powerful machines that pulled heavy trains across continents.","Water heated by burning coal produced steam that drove pistons; exhaust steam was puffed out, creating the iconic 'chug-chug' sound.","India's rail network — largely built using steam locomotives — is one of the largest in the world!"]},{"id":"transportation-gallery-electric-locomotive","gallery":"Transportation Gallery","title":"Electric Locomotive","year":"","points":["Electric locomotives draw power from overhead wires and convert it into motion — faster, quieter, and cleaner than steam.","Electric motors convert electrical energy directly into rotational motion, making electric trains extremely efficient with no on-board emissions.","India's Vande Bharat Express is an electric train that reaches 180 km/h — over 10 times faster than Stephenson's first train!"]},{"id":"space-gallery-mercury-capsule","gallery":"Space Gallery","title":"Mercury Capsule","year":"1958-1963","points":["NASA's Project Mercury (1958-63) was America's first human spaceflight programme — its cone-shaped capsule carried one astronaut into orbit.","The capsule was launched on Atlas rockets, orbited Earth, then re-entered using a heat shield, and parachuted into the ocean.","The Mercury capsule was named after the Roman god of speed!"]},{"id":"space-gallery-space-shuttle","gallery":"Space Gallery","title":"Space Shuttle","year":"1981-2011","points":["The Space Shuttle (1981-2011) was the world's first reusable spacecraft — launching like a rocket and landing like a glider on a runway.","It carried up to 7 astronauts and 24 tonnes of cargo, launched satellites, built the ISS, and serviced the Hubble Space Telescope.","The Space Shuttle orbited Earth at 28,000 km/h — circling the globe in just 90 minutes!"]},{"id":"space-gallery-astronaut-rakesh-sharma","gallery":"Space Gallery","title":"Astronaut — Rakesh Sharma","year":"1984","points":["Rakesh Sharma became India's first astronaut on April 3, 1984, when he flew aboard the Soviet Soyuz T-11 spacecraft.","When asked by PM Indira Gandhi how India looked from space, he famously replied: 'Saare Jahaan Se Achha'.","Sharma spent 7 days, 21 hours in space — conducting yoga experiments in weightlessness!"]},{"id":"space-gallery-mars-diorama","gallery":"Space Gallery","title":"Mars Diorama","year":"","points":["Mars features the solar system's tallest volcano (Olympus Mons, 27 km high) and longest canyon (Valles Marineris, 4,000 km long).","Mars has a thin CO2 atmosphere, evidence of ancient river valleys, and average temperatures of -60 degrees C.","NASA's Perseverance rover has been exploring Mars since 2021, searching for signs of ancient microbial life!"]},{"id":"space-gallery-titan-diorama","gallery":"Space Gallery","title":"Titan Diorama","year":"","points":["Titan is Saturn's largest moon — the only moon in the solar system with a thick atmosphere and lakes of liquid methane on its surface!","It has an orange haze of nitrogen and methane; liquid hydrocarbon lakes at -179 degrees C; and complex organic chemistry similar to early Earth.","NASA's Dragonfly mission (launching 2027) will fly a rotorcraft on Titan — like a helicopter exploring an alien world!"]},{"id":"space-gallery-on-the-moon","gallery":"Space Gallery","title":"On the Moon","year":"4.5 Billion Years Old","points":["The Moon formed about 4.5 billion years ago from debris when a Mars-sized body collided with Earth — our closest celestial neighbour.","It has no atmosphere, extreme temperatures, and its surface is covered in craters from billions of years of meteor impacts.","Astronauts on Apollo 11 (1969) left a mirror on the Moon — scientists still bounce lasers off it to measure the Moon's exact distance from Earth!"]},{"id":"space-gallery-bhaskara-satellite","gallery":"Space Gallery","title":"Bhaskara Satellite","year":"1979 & 1981","points":["Bhaskara-I (1979) and Bhaskara-II (1981) were India's first experimental remote-sensing satellites — named after ancient Indian mathematicians.","They carried TV cameras and microwave radiometers to study Earth's land, water, and forests from space, collecting over 2,000 images.","Bhaskara was a key milestone for ISRO — proving that India could build, launch, and operate its own satellites!"]},{"id":"space-gallery-chandrayaan","gallery":"Space Gallery","title":"Chandrayaan","year":"2008 & 2023","points":["Chandrayaan-1 (2008) made the groundbreaking discovery of water molecules on the Moon; Chandrayaan-3 (2023) successfully landed near the lunar south pole.","Chandrayaan-3's Vikram lander and Pragyan rover conducted science experiments on the Moon's surface.","India became only the 4th nation to soft-land on the Moon — and the first to land near the south pole!"]},{"id":"space-gallery-planets-mercury-to-pluto","gallery":"Space Gallery","title":"Planets: Mercury to Pluto","year":"","points":["Our solar system has 8 planets — from tiny Mercury (closest to the Sun) to giant Neptune — plus dwarf planets like Pluto (discovered 1930).","Terrestrial planets are rocky; gas giants are mostly hydrogen; ice giants contain icy compounds.","Jupiter's Great Red Spot is a storm raging for over 350 years — larger than the entire planet Earth!"]},{"id":"space-gallery-geostationary-satellites","gallery":"Space Gallery","title":"Geostationary Satellites","year":"","points":["Geostationary satellites orbit at exactly 35,786 km above the equator, moving at the same speed as Earth's rotation — so they appear 'fixed' in the sky.","India's INSAT satellites provide weather data, TV broadcasting, and communication; Hubble gives us stunning images of the universe.","Over 500 operational satellites orbit in the geostationary belt — without them, your phone, TV, and weather forecasts would not work!"]},{"id":"space-gallery-nebula-galaxy-panels","gallery":"Space Gallery","title":"Nebula & Galaxy Panels","year":"","points":["The universe contains over 200 billion galaxies, each holding billions of stars — from the Milky Way's spiral arms to the Andromeda galaxy's trillion stars.","Nebulae are giant clouds of gas and dust where new stars are born — the Orion Nebula is a stellar nursery visible to the naked eye.","The Andromeda Galaxy is heading towards us at 110 km/s — but it won't collide with the Milky Way for another 4.5 billion years!"]},{"id":"space-gallery-big-bang","gallery":"Space Gallery","title":"Big Bang","year":"13.8 Billion Years Ago","points":["The Big Bang Theory states that the universe began about 13.8 billion years ago from an extremely hot, dense point and has been expanding ever since.","In the first seconds, subatomic particles formed; later, atoms, then stars and galaxies — the universe is still expanding today.","Look up at the night sky and you are literally looking back in time!"]},{"id":"space-gallery-our-solar-system","gallery":"Space Gallery","title":"Our Solar System","year":"4.6 Billion Years Old","points":["The solar system formed 4.6 billion years ago from a rotating cloud of gas and dust.","The Sun contains over 99% of the solar system's mass; planets orbit it in ellipses held by gravitational force.","If the Sun were a basketball, Earth would be a grape seed 26 metres away — and Neptune would be over 800 metres distant!"]},{"id":"space-gallery-formation-of-earth","gallery":"Space Gallery","title":"Formation of Earth","year":"4.6 Billion Years Old","points":["Earth formed 4.6 billion years ago when gravity pulled together dust and rock — heavy iron sank to form the core, lighter rock formed the crust.","Early Earth was a molten ball; a giant impact created the Moon; slowly it cooled, oceans formed, and life began about 3.8 billion years ago.","Earth is the only known planet with liquid water on its surface, plate tectonics, and complex life!"]},{"id":"coal-mine-gallery-cut-globe","gallery":"Coal Mine Gallery","title":"Cut Globe","year":"","points":["A cut globe shows the interior layers of Earth — the inner and outer core, mantle, and crust.","Earth's inner core is solid iron-nickel at 5,400 degrees C; the outer core is liquid iron generating Earth's magnetic field; the mantle is hot slow-flowing rock.","If you could travel to Earth's centre, the pressure would be 3.5 million times greater than at the surface!"]},{"id":"coal-mine-gallery-mineral-map-of-india","gallery":"Coal Mine Gallery","title":"Mineral Map of India","year":"","points":["India is rich in minerals — coal in Jharkhand and Odisha; iron ore in Goa and Chhattisgarh; bauxite in Odisha; copper in Rajasthan.","This map shows where different minerals are found across India, explaining why certain industries are located in specific regions.","India has the world's 4th largest coal reserves — enough to last over 100 years at current usage rates!"]},{"id":"coal-mine-gallery-makrana-marble-mine","gallery":"Coal Mine Gallery","title":"Makrana Marble Mine","year":"","points":["Makrana in Rajasthan is world-famous for its pure white marble — the same marble used to build the Taj Mahal over 350 years ago!","Marble is formed when limestone is subjected to extreme heat and pressure deep underground — a process called metamorphism.","Over 1,000 craftsmen worked for 22 years to build the Taj Mahal, using 28,000 tonnes of Makrana marble!"]},{"id":"coal-mine-gallery-oil-fields","gallery":"Coal Mine Gallery","title":"Oil Fields","year":"","points":["Oil fields are underground reservoirs of petroleum trapped in porous rock — drilled to extract crude oil that is then refined into petrol, diesel, and plastics.","Oil formed from marine organisms over millions of years; heat and pressure converted organic matter into hydrocarbons trapped in rock formations.","India's Mumbai High oil field was discovered in 1974 and has produced over a billion barrels of oil since!"]},{"id":"coal-mine-gallery-copper-mine","gallery":"Coal Mine Gallery","title":"Copper Mine","year":"10,000 Years Ago","points":["Copper — one of the first metals used by humans — is mined from ores like chalcopyrite, crushed, and smelted to produce pure copper metal.","India's Khetri Copper Complex in Rajasthan is one of the largest copper projects in Asia, mining ore from hundreds of metres underground.","Copper was the first metal worked by humans, over 10,000 years ago — and it's still essential in every electrical wire and circuit board!"]},{"id":"coal-mine-gallery-volcano-eruption","gallery":"Coal Mine Gallery","title":"Volcano Eruption","year":"","points":["A volcano is an opening in Earth's crust where molten rock (magma), ash, and gases escape — releasing enormous stored energy.","Magma forms when rock melts due to heat or reduced pressure in the mantle; it rises and erupts as lava when it reaches the surface.","The 1815 eruption of Mount Tambora caused 'The Year Without Summer' — crops failed across the entire Northern Hemisphere!"]},{"id":"coal-mine-gallery-geological-column","gallery":"Coal Mine Gallery","title":"Geological Column","year":"","points":["The geological column is a record of Earth's history written in rock layers — each stratum represents millions of years of sediment, fossils, and events.","Older rocks lie deeper; fossil types change through the column, telling us about the evolution of life over 540 million years of geological time.","Scientists can read Earth's history like a book from rock layers — the Grand Canyon reveals 2 billion years of geological history!"]},{"id":"coal-mine-gallery-gold-mine","gallery":"Coal Mine Gallery","title":"Gold Mine","year":"","points":["Gold occurs naturally in quartz veins and alluvial deposits — mined by crushing ore and using cyanide leaching to extract pure gold.","India's Kolar Gold Fields in Karnataka were once among the world's deepest gold mines — shafts going over 3 km below the surface.","All the gold ever mined would form a cube just 21 metres on each side!"]},{"id":"coal-mine-gallery-coal-formation","gallery":"Coal Mine Gallery","title":"Coal Formation","year":"300 Million Years Old","points":["Coal formed from dense forests that grew in tropical swamps 300 million years ago — when plants died, they were compressed by layers of sediment over millennia.","Plant material slowly transformed: peat to lignite to bituminous coal to anthracite — each stage has more carbon and energy.","Coal takes 300 million years to form but we've burned most reserves in just 300 years!"]},{"id":"coal-mine-gallery-coal-fields","gallery":"Coal Mine Gallery","title":"Coal Fields","year":"","points":["Coal fields are regions where coal deposits occur in thick underground seams — India's largest are in the Damodar Valley (Jharkhand/West Bengal).","Raniganj (1774) was India's first coal mine; the Jharia field still holds one of the world's largest coking coal reserves.","Some coal seams in Jharia have been burning underground for over 100 years — a fire that no one has been able to extinguish!"]},{"id":"coal-mine-gallery-coal-mine-shaft-equipment","gallery":"Coal Mine Gallery","title":"Coal Mine Shaft & Equipment","year":"","points":["A coal mine shaft is a vertical tunnel sunk into the earth to access underground coal seams — equipped with lifts, ventilation, and water pumps.","Miners descend the shaft in cages; cutting machines, roof supports, and conveyor belts work together to extract and transport coal safely.","The deepest coal mine shafts go over 3,000 metres underground — where temperatures can reach 60 degrees C!"]},{"id":"coal-mine-gallery-long-wall-coal-mine","gallery":"Coal Mine Gallery","title":"Long Wall Coal Mine","year":"","points":["Longwall mining is a highly efficient method where a shearing machine cuts a long face of coal (up to 400 m wide) in a single pass.","Hydraulic roof supports protect miners as the cutting machine moves back and forth; extracted coal falls onto a conveyor belt to the surface.","A modern longwall mine can extract over 5 million tonnes of coal per year!"]},{"id":"coal-mine-gallery-khetri-copper-project","gallery":"Coal Mine Gallery","title":"Khetri Copper Project","year":"1960s","points":["The Khetri Copper Complex in Rajasthan is India's largest copper mining and smelting project, producing copper since the 1960s.","Ore is mined underground, crushed, concentrated by flotation, smelted in a flash furnace, and refined electrolytically to 99.99% pure copper.","Copper from Khetri helps make electrical cables, printed circuit boards, plumbing pipes, and the coins in your pocket!"]},{"id":"electronic-gallery-electronic-marvels","gallery":"Electronic Gallery","title":"Electronic Marvels","year":"1945","points":["Electronics transformed the 20th century — from radios and televisions to computers and smartphones, using circuits of tiny components to process signals.","Electronic devices control the flow of electrons using resistors, capacitors, transistors, and integrated circuits.","The first computer ENIAC (1945) weighed 27 tonnes and filled a room — today your phone is millions of times more powerful!"]},{"id":"electronic-gallery-synchronized-projection-system","gallery":"Electronic Gallery","title":"Synchronized Projection System","year":"","points":["This system synchronises multiple projectors to display coordinated images or information — an early form of multimedia presentation technology.","Synchronisation uses a master timing signal to ensure all projectors change slides or images at exactly the same moment.","Modern digital projectors in cinemas synchronise up to 48 frames per second — creating smooth, lifelike motion pictures!"]},{"id":"electronic-gallery-t-v-video","gallery":"Electronic Gallery","title":"T.V. / Video","year":"1959","points":["Television works by converting light into electronic signals, transmitting them, and reconverting them into images on a screen.","Early TVs used cathode ray tubes (CRT); modern TVs use LCD, LED, OLED, or QLED displays.","The first TV broadcast in India was in Delhi in 1959 — on a small screen in a modest studio.","Today India has over 900 TV channels!"]},{"id":"electronic-gallery-robot","gallery":"Electronic Gallery","title":"Robot","year":"","points":["Robots are programmable machines that carry out complex tasks automatically — used in manufacturing, surgery, space exploration, and disaster response.","Robots use sensors, actuators (motors), and computers running programmed instructions to perceive and interact with their environment.","The word 'robot' comes from the Czech word 'robota' meaning forced labour!"]},{"id":"electronic-gallery-silicon-chip","gallery":"Electronic Gallery","title":"Silicon Chip","year":"","points":["A silicon chip (integrated circuit) packs millions — now billions — of transistors onto a fingernail-sized piece of silicon, forming the brain of every electronic device.","Chips are made through photolithography — shining UV light through a mask to etch circuit patterns into silicon.","Intel's latest chips have over 50 billion transistors, each thinner than a human DNA strand!"]},{"id":"electronic-gallery-how-things-work","gallery":"Electronic Gallery","title":"How Things Work","year":"","points":["This interactive zone demonstrates the science behind everyday objects — electric motors, light bulbs, microphones, loudspeakers, and transformers.","Each device converts energy from one form to another: motors (electrical to mechanical), bulbs (electrical to light), microphones (sound to electrical).","Understanding how things work is the first step to inventing new things!"]},{"id":"chemical-technology-gallery-coke-ovens","gallery":"Chemical Technology Gallery","title":"Coke Ovens","year":"","points":["Coke ovens heat coal to over 1,000 degrees C in the absence of air — driving off gases and transforming coal into coke, a vital fuel for blast furnaces.","The process drives off volatile compounds (tar, ammonia, benzene) which are collected as valuable by-products; pure carbon coke remains.","Without coke ovens, we couldn't make steel — and without steel, there would be no skyscrapers, bridges, trains, or cars!"]},{"id":"chemical-technology-gallery-fertilizer-plant","gallery":"Chemical Technology Gallery","title":"Fertilizer Plant","year":"1909","points":["Fertilizer plants manufacture nitrogen, phosphorus, and potassium compounds that replenish soil nutrients and dramatically increase crop yields.","The Haber-Bosch process (1909) combines atmospheric nitrogen with hydrogen at high temperature and pressure to make ammonia — the basis of all nitrogen fertilisers.","The Haber-Bosch process feeds half of humanity!"]},{"id":"chemical-technology-gallery-oil-refinery","gallery":"Chemical Technology Gallery","title":"Oil Refinery","year":"","points":["An oil refinery separates crude petroleum into useful products — petrol, diesel, kerosene, LPG, and raw materials for plastics — through fractional distillation.","Crude oil is heated; different hydrocarbon fractions boil at different temperatures and are collected at different heights in a distillation column.","One barrel of crude oil (159 litres) produces about 70 litres of petrol, 32 litres of diesel, plus LPG, jet fuel, and more!"]},{"id":"chemical-technology-gallery-calcium-carbide-plant","gallery":"Chemical Technology Gallery","title":"Calcium Carbide Plant","year":"","points":["Calcium carbide is made by heating limestone and coke to 2,000 degrees C in an electric arc furnace — it reacts with water to produce acetylene gas.","Acetylene is used for welding and cutting metals; calcium carbide is also used to ripen fruits (though this practice is banned in India).","Acetylene flames reach 3,500 degrees C — hot enough to cut through the thickest steel beams!"]},{"id":"chemical-technology-gallery-soda-ash-plant","gallery":"Chemical Technology Gallery","title":"Soda Ash Plant","year":"","points":["Soda ash (sodium carbonate) is produced by the Solvay process — treating brine (salt water) with ammonia and carbon dioxide.","Soda ash is used in making glass, detergents, paper, textiles, and water treatment — one of the most widely used industrial chemicals.","Over 60 million tonnes of soda ash are produced each year — most of the glass in your windows and bottles contains soda ash!"]},{"id":"chemical-technology-gallery-sambhar-salt-lake","gallery":"Chemical Technology Gallery","title":"Sambhar Salt Lake","year":"","points":["Sambhar Salt Lake in Rajasthan is India's largest inland saltwater lake — one of the most important sources of salt in the country.","During winter, the lake's water evaporates leaving behind salt crystals harvested using a process unchanged for over 1,000 years.","Sambhar Lake is also a Ramsar Wetland and hosts thousands of flamingos!"]},{"id":"chemical-technology-gallery-paper-mill","gallery":"Chemical Technology Gallery","title":"Paper Mill","year":"","points":["Paper is made from plant fibres (wood pulp, bamboo, or recycled paper) beaten into a slurry, spread on screens, and dried into sheets.","In the Kraft process, wood chips are cooked in chemicals to dissolve lignin, leaving pure cellulose fibres for paper.","Recycling one tonne of paper saves 17 trees and 26,000 litres of water!"]},{"id":"chemical-technology-gallery-sugar-factory","gallery":"Chemical Technology Gallery","title":"Sugar Factory","year":"","points":["A sugar factory extracts sucrose from sugarcane by crushing, clarifying the juice, evaporating water, and crystallising the sugar.","Sugarcane is crushed between rollers; juice is heated with lime to remove impurities; evaporation concentrates it; cooling crystallises pure white sugar.","India is the world's largest consumer of sugar and the second largest producer!"]},{"id":"chemical-technology-gallery-coal-by-products","gallery":"Chemical Technology Gallery","title":"Coal By-Products","year":"","points":["When coal is processed (coked), it yields many valuable by-products: coal tar, benzene, naphthalene, ammonia, coal gas, and phenol.","Coal tar is the source of thousands of chemicals used in dyes, medicines, plastics, road surfaces, and cosmetics.","Aspirin, explosives, perfumes, and even food dyes were all originally derived from coal tar!"]},{"id":"textile-gallery-textile-map-of-india","gallery":"Textile Gallery","title":"Textile Map of India","year":"","points":["India's textile industry is one of the oldest and most diverse in the world — from Kashmir's pashmina to Varanasi's silk, Rajasthan's bandhani, and Kerala's khadi.","Different regions specialise in different fabrics, weaves, and dyes based on local crops, climate, and centuries-old crafting traditions.","India's textile and apparel industry is worth over $150 billion — it is the 2nd largest employer in India after agriculture!"]},{"id":"textile-gallery-jute-mill","gallery":"Textile Gallery","title":"Jute Mill","year":"","points":["Jute — the 'golden fibre' — is grown mainly in West Bengal; jute mills weave it into sacking, rope, carpet backing, and eco-friendly bags.","Jute fibres are extracted from the stalks by retting (soaking in water), then spun and woven into coarse but strong fabric.","Jute is 100% biodegradable and grows without pesticides — one of the most eco-friendly natural fibres!"]},{"id":"textile-gallery-cotton-mill","gallery":"Textile Gallery","title":"Cotton Mill","year":"","points":["Cotton mills use spinning machines and power looms to transform raw cotton fibres into yarn and then into woven cloth at industrial scale.","Cotton fibres are ginned (seeds removed), cleaned, carded (straightened), spun into yarn, and woven into fabric.","India was once the world's leading cotton textile producer — British colonial policies deliberately destroyed this industry!"]},{"id":"textile-gallery-spinning-carding-machine","gallery":"Textile Gallery","title":"Spinning & Carding Machine","year":"1764","points":["Carding machines comb and straighten cotton fibres; spinning machines then twist them into strong continuous yarn — the basis of all woven fabric.","The spinning jenny (James Hargreaves, 1764) and the spinning mule (Samuel Crompton, 1779) could spin many threads simultaneously — triggering the Industrial Revolution.","Mahatma Gandhi's 'Charkha' (spinning wheel) became the symbol of Indian independence!"]},{"id":"textile-gallery-silk-moth-life-history","gallery":"Textile Gallery","title":"Silk Moth Life History","year":"","points":["Silk comes from the cocoon of the mulberry silkworm (Bombyx mori) — a caterpillar that spins a continuous filament of silk to form its chrysalis.","Life cycle: egg to caterpillar (feeds on mulberry leaves) to cocoon (silk thread) to moth.","Boiling the cocoon unravels up to 1.5 km of silk filament!","One silk saree requires cocoons of about 10,000 silkworms."]},{"id":"textile-gallery-rayon-spinning-mill","gallery":"Textile Gallery","title":"Rayon Spinning Mill","year":"1890s","points":["Rayon is a semi-synthetic fibre made from cellulose (wood pulp or bamboo) — dissolved in chemicals and extruded through tiny holes to form soft, silky threads.","The viscose process treats cellulose with caustic soda and carbon disulphide to make a thick liquid; this is forced through a spinneret into an acid bath where it solidifies.","Rayon was the world's first man-made fibre (1890s) — it mimics silk so well it was originally called 'artificial silk'!"]},{"id":"textile-gallery-viscose-rayon-process","gallery":"Textile Gallery","title":"Viscose Rayon Process","year":"","points":["Viscose rayon is produced when cellulose is treated with chemicals to form a viscous (thick) liquid that is spun into fibres with a silky feel.","The process: cellulose pulp to sodium hydroxide treatment to carbon disulphide to viscous solution to extruded through spinneret to acid bath solidifies it into fibre.","Viscose rayon is used in sarees, dress fabrics, linings, and medical bandages!"]},{"id":"textile-gallery-nylon-polyester-yarn-production","gallery":"Textile Gallery","title":"Nylon & Polyester Yarn Production","year":"1938","points":["Nylon (1938) was the world's first fully synthetic fibre — made from chemicals derived from coal, oil, and natural gas through polymerisation.","Polyester is made by reacting acids and alcohols to form long polymer chains, melted and extruded through tiny holes to form strong, wrinkle-resistant fibres.","The first nylon stockings (1940) — 72,000 pairs sold out in just a few hours!"]},{"id":"textile-gallery-cotton-plant-history","gallery":"Textile Gallery","title":"Cotton Plant History","year":"5,000 Years","points":["Cotton has been cultivated in India for over 5,000 years — the Indus Valley Civilisation used cotton fabric, making India one of the birthplaces of cotton textiles.","The cotton plant produces fluffy white bolls containing seeds surrounded by soft fibres — the basis of one of the world's most important crops.","India is the world's largest producer of cotton — growing about 6 million tonnes per year!"]},{"id":"textile-gallery-charkha-spinning-wheel","gallery":"Textile Gallery","title":"Charkha (Spinning Wheel)","year":"","points":["The charkha is a portable hand-spinning wheel that Mahatma Gandhi made the symbol of India's independence movement and self-reliance (Swadeshi).","A charkha twists fibres together into strong yarn using a hand-cranked spindle — entirely self-powered.","Gandhi spun on his charkha every single day — even while travelling — saying 'Spinning is my meditation.'"]},{"id":"agriculture-gallery-grain-production-centers-in-india","gallery":"Agriculture Gallery","title":"Grain Production Centers in India","year":"","points":["India is one of the world's largest food producers — wheat grows in Punjab and Haryana; rice in West Bengal and Andhra Pradesh; maize in Karnataka.","The Green Revolution of the 1960s-70s introduced high-yielding seed varieties, irrigation, and fertilisers, transforming India from a food-deficit to a food-surplus nation.","India produces over 300 million tonnes of food grains every year!"]},{"id":"agriculture-gallery-coffee-plant","gallery":"Agriculture Gallery","title":"Coffee Plant","year":"","points":["India is the world's 6th largest coffee producer — grown mainly in the Western Ghats (Karnataka, Kerala, Tamil Nadu) under shade trees in a unique mixed-crop system.","Coffee berries ripen on the plant; the outer fruit is removed to reveal the bean (seed), which is dried, roasted, and ground to make the beverage.","The world's most expensive coffee — Kopi Luwak — passes through the digestive system of civets!"]},{"id":"agriculture-gallery-tobacco-plant","gallery":"Agriculture Gallery","title":"Tobacco Plant","year":"","points":["Tobacco (Nicotiana tabacum) is cultivated mainly in Andhra Pradesh, Karnataka, and Gujarat — India is the 3rd largest producer in the world.","Leaves are harvested, cured (dried using heat, air, or smoke), and processed into cigarettes, beedis, chewing tobacco, and snuff.","Tobacco was originally used medicinally by Native Americans 3,000 years ago — Europeans brought it to India and the rest of the world!"]},{"id":"agriculture-gallery-cotton-plant","gallery":"Agriculture Gallery","title":"Cotton Plant","year":"","points":["The cotton plant produces fluffy white bolls that are harvested, ginned to remove seeds, and spun into one of the world's most important textile fibres.","India grows cotton mainly in Maharashtra, Gujarat, and Telangana — the 'Black Soil' of the Deccan Plateau retains moisture perfectly for cotton.","India was known as 'Suvarnabhoomi' (Land of Gold) in ancient times partly because of its magnificent cotton textiles!"]},{"id":"agriculture-gallery-sugar-cane-varieties","gallery":"Agriculture Gallery","title":"Sugar Cane Varieties","year":"","points":["India cultivates dozens of sugarcane varieties — bred for higher sugar content, drought resistance, disease resistance, and suitability for different climates.","Sugarcane is a tall grass that stores sucrose in its thick stems — harvested annually, crushed in mills, and processed into white or raw sugar.","India is the world's largest producer of sugar — and sugarcane is one of the most efficient solar energy converters in the plant kingdom!"]},{"id":"agriculture-gallery-rubber-plantation","gallery":"Agriculture Gallery","title":"Rubber Plantation","year":"","points":["India is the world's 4th largest natural rubber producer — grown mainly in Kerala where rubber trees thrive.","Latex (natural rubber liquid) is tapped from the bark by making a spiral cut; it is coagulated with acid, rolled into sheets, and dried.","All rubber trees outside the Amazon trace back to seeds smuggled from Brazil in 1876!"]},{"id":"agriculture-gallery-tea-garden-factory","gallery":"Agriculture Gallery","title":"Tea Garden & Factory","year":"","points":["India is the world's 2nd largest tea producer — grown in Darjeeling, Assam, and the Nilgiris.","Tea leaves are plucked (only the top 2 leaves and bud), withered, rolled, oxidised (for black tea), and dried to produce the final product.","A single Assam estate can be larger than an entire European city!"]},{"id":"agriculture-gallery-forestry","gallery":"Agriculture Gallery","title":"Forestry","year":"","points":["India has about 23% forest cover — from tropical rainforests in the Western Ghats to temperate forests in the Himalayas and dry forests in central India.","Forests provide timber, medicinal plants, fruits, and ecosystem services like carbon sequestration, water cycle regulation, and biodiversity habitat.","India's forests are home to 7% of the world's plant species and 6.5% of all bird species!"]},{"id":"agriculture-gallery-dairy-farm","gallery":"Agriculture Gallery","title":"Dairy Farm","year":"","points":["India has the world's largest dairy industry — with about 500 million cattle and buffalo producing over 230 million tonnes of milk annually.","Modern dairy farms use scientific feeding, veterinary care, milking machines, and cold chains to maximise milk production.","Operation Flood transformed India from a milk-deficit country to the world's largest milk producer in just 20 years!"]},{"id":"agriculture-gallery-indian-cattle","gallery":"Agriculture Gallery","title":"Indian Cattle","year":"","points":["India's indigenous cattle breeds — Gir, Tharparkar, Sahiwal, Red Sindhi — are famous for their heat tolerance, disease resistance, and high-quality milk.","Zebu cattle (Bos indicus), with their distinctive humps, are ideally adapted to India's tropical climate and have been farmed here for 8,000 years.","Indian cattle breeds are now prized worldwide — Gir cattle from Gujarat have been exported to Brazil and Israel!"]},{"id":"agriculture-gallery-green-revolution","gallery":"Agriculture Gallery","title":"Green Revolution","year":"1960s-70s","points":["The Green Revolution (1960s-70s) introduced high-yielding dwarf wheat and rice varieties, chemical fertilisers, and modern irrigation — saving millions from starvation.","Led by scientists like M.S.","Swaminathan and Norman Borlaug, wheat production in India tripled between 1965 and 1975.","India went from importing food in the 1960s to exporting over 20 million tonnes of rice per year today!"]},{"id":"agriculture-gallery-tractor-agriculture-implements","gallery":"Agriculture Gallery","title":"Tractor & Agriculture Implements","year":"","points":["Modern tractors and implements — ploughs, seed drills, harvesters, and irrigation pumps — have transformed farming from manual labour to mechanised efficiency.","A tractor converts diesel fuel energy into mechanical power through its engine and PTO shaft, which drives attached implements.","One tractor can do the work of 50 bullocks in the same time!"]},{"id":"human-biology-gallery-our-wonderful-body","gallery":"Human Biology Gallery","title":"Our Wonderful Body","year":"","points":["The human body is an extraordinary machine — 37 trillion cells, 206 bones, over 600 muscles, 100,000 km of blood vessels, and a brain with 86 billion neurons.","All systems — skeletal, muscular, circulatory, respiratory, digestive, nervous, and endocrine — work together in perfect coordination to keep us alive.","Your body creates 3.8 million new cells every single second!"]},{"id":"human-biology-gallery-heart","gallery":"Human Biology Gallery","title":"Heart","year":"","points":["The heart is a fist-sized muscle that pumps blood through 100,000 km of blood vessels — beating about 100,000 times every day without ever stopping!","It has four chambers: right atrium and ventricle pump deoxygenated blood to the lungs; left atrium and ventricle pump oxygenated blood to the body.","In a lifetime of 80 years, your heart beats about 3 billion times!"]},{"id":"human-biology-gallery-eye","gallery":"Human Biology Gallery","title":"Eye","year":"","points":["The human eye can detect about 10 million different colours and distinguish shapes in both bright sunlight and dim moonlight.","Light enters through the cornea, passes through the pupil and lens, and hits the retina where rods and cones convert it to nerve signals.","The eye can detect a candle flame from 14 km away in complete darkness!"]},{"id":"human-biology-gallery-ear","gallery":"Human Biology Gallery","title":"Ear","year":"","points":["The ear converts sound waves into electrical nerve signals — using three tiny bones (malleus, incus, stapes) to amplify vibrations and transfer them to the cochlea.","The outer ear collects sound; the middle ear amplifies it; the inner ear (cochlea) converts it to signals, while the vestibular system maintains balance.","The three bones in your middle ear can vibrate 20,000 times per second!"]},{"id":"human-biology-gallery-brain","gallery":"Human Biology Gallery","title":"Brain","year":"","points":["The brain contains 86 billion neurons each connected to up to 10,000 others, forming 100 trillion synapses.","Divided into cerebrum (thinking), cerebellum (coordination), and brainstem (breathing, heart rate), the brain processes over 400 billion bits of information per second.","Your brain generates enough electricity to power a small LED light bulb!"]},{"id":"human-biology-gallery-digestive-system","gallery":"Human Biology Gallery","title":"Digestive System","year":"","points":["The digestive system breaks food into nutrients the body can absorb — from mouth (chewing, saliva) through stomach (acid, enzymes) to small intestine (absorption).","The small intestine has tiny finger-like projections called villi that increase its surface area to 200 square metres — the size of a tennis court — for maximum nutrient absorption.","It takes food 24-72 hours to travel the entire 9 metres of your digestive tract!"]},{"id":"human-biology-gallery-skeletal-system","gallery":"Human Biology Gallery","title":"Skeletal System","year":"","points":["The human skeleton has 206 bones that provide structural support, protect vital organs, enable movement, and produce blood cells in bone marrow.","Bones are living organs — constantly remodelling themselves; made of collagen (flexibility) and calcium phosphate (hardness) — stronger than concrete for their weight.","You are born with 270 bones — some fuse as you grow, leaving 206 by adulthood!"]},{"id":"human-biology-gallery-respiratory-system","gallery":"Human Biology Gallery","title":"Respiratory System","year":"","points":["The respiratory system delivers oxygen to the blood and removes carbon dioxide — the lungs contain 300 million tiny air sacs (alveoli) with a total surface area of 70 square metres.","Breathing in: diaphragm contracts, chest expands, air rushes into lungs; oxygen passes into blood capillaries; CO2 passes out and is exhaled.","You breathe about 22,000 times per day!"]},{"id":"human-biology-gallery-circulatory-system","gallery":"Human Biology Gallery","title":"Circulatory System","year":"","points":["The circulatory system — heart, arteries, veins, and capillaries — delivers oxygen, nutrients, and hormones to every cell and removes waste products.","Arteries carry oxygenated blood away from the heart; veins return deoxygenated blood; capillaries (thinner than a hair) exchange nutrients at tissue level.","If all your blood vessels were laid end to end, they would circle the Earth 2.5 times!"]},{"id":"human-biology-gallery-human-evolution","gallery":"Human Biology Gallery","title":"Human Evolution","year":"300,000 Years Ago","points":["Modern humans (Homo sapiens) evolved in Africa about 300,000 years ago, descended from a lineage that branched from other apes about 7 million years ago.","Key stages: Australopithecus to Homo habilis (tool use) to Homo erectus (fire) to Homo sapiens.","You share 98.7% of your DNA with chimpanzees — and 60% with a banana!"]}];
